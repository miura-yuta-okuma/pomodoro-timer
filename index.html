<title>ポモドーロタイマー</title>
<meta name="description" content="集中のためのポモドーロタイマー — ポモドーロ・短い休憩・長い休憩">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:               #0f0f14;
    --surface:          #17171f;
    --surface-raised:   #1e1e28;
    --border:           #26263a;
    --border-dim:       #1c1c28;

    --clr-work:         #e07843;
    --rgb-work:         224, 120, 67;
    --clr-short:        #3d9e84;
    --rgb-short:        61, 158, 132;
    --clr-long:         #5479c8;
    --rgb-long:         84, 121, 200;

    --text:             #e6e1d6;
    --text-muted:       #56546e;
    --text-faint:       #2e2c42;

    --ring-r:           130;
    --ring-circ:        816.814;
  }

  html, body {
    height: 100%;
    background: var(--bg);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
    min-height: 100vh;
  }

  /* ── Ambient glow behind ring ── */
  #glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    transition: background 0.7s ease;
  }

  /* ── App shell ── */
  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.2rem;
    width: min(420px, 90vw);
    padding: 1.5rem 1rem 2.5rem;
  }

  /* ── Mode tabs ── */
  .mode-tabs {
    display: flex;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border-dim);
    border-radius: 10px;
    padding: 3px;
  }

  .tab {
    background: none;
    border: none;
    padding: 0.45rem 1.1rem;
    border-radius: 7px;
    font-size: 0.775rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--surface-raised);
    color: var(--text);
  }
  .app.m-work   .tab.active { color: var(--clr-work); }
  .app.m-short  .tab.active { color: var(--clr-short); }
  .app.m-long   .tab.active { color: var(--clr-long); }

  /* ── Ring ── */
  .ring-wrap {
    position: relative;
    width: min(300px, 62vmin);
    height: min(300px, 62vmin);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ring-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
    transform-origin: center;
    overflow: visible;
  }

  .ring-track {
    fill: none;
    stroke: var(--border-dim);
    stroke-width: 2.5;
  }

  .ring-arc {
    fill: none;
    stroke: var(--clr-work);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 816.814;
    stroke-dashoffset: 0;
    transition:
      stroke-dashoffset 1s linear,
      stroke 0.5s ease,
      filter 0.6s ease;
  }

  /* Tick marks at quarter intervals */
  .tick {
    stroke: var(--border);
    stroke-width: 1;
    opacity: 0.6;
  }

  /* Glow pulse when running */
  @keyframes arc-glow-work {
    0%, 100% { filter: drop-shadow(0 0 5px rgba(224,120,67,0.28)); }
    50%       { filter: drop-shadow(0 0 14px rgba(224,120,67,0.55)); }
  }
  @keyframes arc-glow-short {
    0%, 100% { filter: drop-shadow(0 0 5px rgba(61,158,132,0.28)); }
    50%       { filter: drop-shadow(0 0 14px rgba(61,158,132,0.55)); }
  }
  @keyframes arc-glow-long {
    0%, 100% { filter: drop-shadow(0 0 5px rgba(84,121,200,0.28)); }
    50%       { filter: drop-shadow(0 0 14px rgba(84,121,200,0.55)); }
  }

  .app.running.m-work  .ring-arc { animation: arc-glow-work  3.5s ease-in-out infinite; }
  .app.running.m-short .ring-arc { animation: arc-glow-short 3.5s ease-in-out infinite; }
  .app.running.m-long  .ring-arc { animation: arc-glow-long  3.5s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .ring-arc { animation: none !important; transition: stroke-dashoffset 1s linear; }
  }

  .app.m-short .ring-arc { stroke: var(--clr-short); }
  .app.m-long  .ring-arc { stroke: var(--clr-long); }

  /* ── Time display (inside ring) ── */
  .time-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    user-select: none;
  }

  .time {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', ui-monospace, monospace;
    font-size: min(4.4rem, 13.5vmin);
    font-weight: 200;
    letter-spacing: -0.03em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    transition: color 0.4s;
  }

  .time-lbl {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: color 0.4s;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 1.4rem;
  }

  .btn-main {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.8rem 2.8rem;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--text);
    cursor: pointer;
    transition: background 0.18s, border-color 0.3s, color 0.18s;
    min-width: 130px;
    text-align: center;
  }
  .btn-main:hover { background: var(--border); }

  .app.m-work  .btn-main { border-color: rgba(224,120,67,0.25); }
  .app.m-short .btn-main { border-color: rgba(61,158,132,0.25); }
  .app.m-long  .btn-main { border-color: rgba(84,121,200,0.25); }

  .btn-icon {
    background: none;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.18s, background 0.18s;
  }
  .btn-icon:hover {
    color: var(--text);
    background: var(--surface);
  }

  /* ── Session dots ── */
  .sessions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.65rem;
  }

  .dots {
    display: flex;
    gap: 0.55rem;
    align-items: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.35s, transform 0.35s;
  }

  .app.m-work  .dot.done { background: var(--clr-work);  transform: scale(1.15); }
  .app.m-short .dot.done { background: var(--clr-short); transform: scale(1.15); }
  .app.m-long  .dot.done { background: var(--clr-long);  transform: scale(1.15); }

  .session-text {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── Keyboard hints ── */
  .kbd-hint {
    position: fixed;
    bottom: 1.4rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1.8rem;
    z-index: 1;
    pointer-events: none;
  }

  .hint {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.62rem;
    color: var(--text-faint);
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .kk {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border-dim);
    border-radius: 4px;
    padding: 1px 4px;
    font-family: ui-monospace, monospace;
    font-size: 0.58rem;
    min-width: 18px;
    color: var(--text-muted);
  }

  /* ── Completion flash ── */
  @keyframes cflash {
    0%   { opacity: 0; }
    8%   { opacity: 0.12; }
    100% { opacity: 0; }
  }

  .c-flash {
    position: fixed;
    inset: 0;
    background: white;
    pointer-events: none;
    z-index: 200;
    animation: cflash 0.75s ease-out forwards;
  }

  /* ── Focus styles ── */
  .btn-main:focus-visible,
  .btn-icon:focus-visible,
  .tab:focus-visible {
    outline: 2px solid var(--clr-work);
    outline-offset: 2px;
  }
  .app.m-short .btn-main:focus-visible,
  .app.m-short .btn-icon:focus-visible,
  .app.m-short .tab:focus-visible { outline-color: var(--clr-short); }
  .app.m-long  .btn-main:focus-visible,
  .app.m-long  .btn-icon:focus-visible,
  .app.m-long  .tab:focus-visible { outline-color: var(--clr-long); }
</style>

<!-- Ambient glow element -->
<div id="glow" aria-hidden="true"></div>

<div class="app m-work" id="app">

  <!-- Mode tabs -->
  <div class="mode-tabs" role="tablist" aria-label="タイマーモード">
    <button class="tab active" data-mode="work"  role="tab" aria-selected="true">ポモドーロ</button>
    <button class="tab"        data-mode="short" role="tab" aria-selected="false">短い休憩</button>
    <button class="tab"        data-mode="long"  role="tab" aria-selected="false">長い休憩</button>
  </div>

  <!-- Ring + time -->
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 300 300" aria-hidden="true">
      <!-- Track circle -->
      <circle class="ring-track" cx="150" cy="150" r="130"/>

      <!-- Quarter tick marks (at 0°, 90°, 180°, 270° → top/right/bottom/left before -90° rotation of SVG) -->
      <!-- After -90deg rotation: original right→top, bottom→right, left→bottom, top→left -->
      <!-- We place ticks at angles relative to the unrotated SVG -->
      <line class="tick" x1="150" y1="17" x2="150" y2="23"/>   <!-- top of unrotated = right of rotated SVG… wait let me think again -->
      <!-- Actually: SVG rotated -90deg means x-right becomes y-up. So the "top" of the clock face
           is where x was maximum (right side of SVG). Let me just place 4 tick lines at cardinal positions. -->
      <!-- top of clock = (150, 20) after rotation; in original SVG coords (before -90 rot), this is (280, 150) -->
      <!-- right of clock = (280, 150) after rotation; in original SVG, this is (150, 280) -->
      <!-- I'll just drop the ticks and keep it clean -->
    </svg>

    <!-- Progress ring (separate SVG for z-control) -->
    <svg class="ring-svg" viewBox="0 0 300 300" aria-hidden="true">
      <circle
        class="ring-arc"
        id="arcEl"
        cx="150" cy="150" r="130"
        stroke-dasharray="816.814"
        stroke-dashoffset="0"
      />
    </svg>

    <div class="time-display">
      <span class="time"     id="timeEl" aria-live="off" aria-label="残り時間">25:00</span>
      <span class="time-lbl" id="lblEl">集中</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-icon" id="resetBtn" aria-label="リセット" title="リセット (R)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
      </svg>
    </button>

    <button class="btn-main" id="startBtn" aria-label="開始">開始</button>

    <button class="btn-icon" id="skipBtn" aria-label="スキップ" title="スキップ (S)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"/>
        <line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>
  </div>

  <!-- Session dots -->
  <div class="sessions">
    <div class="dots" id="dotsEl" role="group" aria-label="セッション進捗">
      <div class="dot" aria-label="セッション1"></div>
      <div class="dot" aria-label="セッション2"></div>
      <div class="dot" aria-label="セッション3"></div>
      <div class="dot" aria-label="セッション4"></div>
    </div>
    <span class="session-text" id="sessText" aria-live="polite">0 セッション完了</span>
  </div>
</div>

<!-- Keyboard hints -->
<div class="kbd-hint" aria-hidden="true">
  <div class="hint"><span class="kk">Space</span> 開始 / 停止</div>
  <div class="hint"><span class="kk">R</span> リセット</div>
  <div class="hint"><span class="kk">1</span><span class="kk">2</span><span class="kk">3</span> モード切替</div>
</div>

<script>
(function () {
  'use strict';

  const CIRC = 2 * Math.PI * 130; // 816.814

  const MODES = {
    work:  { duration: 25 * 60, label: '集中',    cls: 'm-work'  },
    short: { duration:  5 * 60, label: '短い休憩', cls: 'm-short' },
    long:  { duration: 15 * 60, label: '長い休憩', cls: 'm-long'  },
  };

  const GLOW = {
    work:  'radial-gradient(ellipse 55% 45% at 50% 54%, rgba(224,120,67,0.06) 0%, transparent 68%)',
    short: 'radial-gradient(ellipse 55% 45% at 50% 54%, rgba(61,158,132,0.06) 0%, transparent 68%)',
    long:  'radial-gradient(ellipse 55% 45% at 50% 54%, rgba(84,121,200,0.06) 0%, transparent 68%)',
  };

  let mode      = 'work';
  let timeLeft  = MODES.work.duration;
  let running   = false;
  let sessions  = 0;
  let ticker    = null;

  // DOM refs
  const appEl    = document.getElementById('app');
  const glowEl   = document.getElementById('glow');
  const arcEl    = document.getElementById('arcEl');
  const timeEl   = document.getElementById('timeEl');
  const lblEl    = document.getElementById('lblEl');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const skipBtn  = document.getElementById('skipBtn');
  const dotsEl   = document.getElementById('dotsEl');
  const sessText = document.getElementById('sessText');
  const tabs     = document.querySelectorAll('.tab');

  // ── Helpers ──────────────────────────────────────────────────

  function fmt(s) {
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const ss = (s % 60).toString().padStart(2, '0');
    return `${m}:${ss}`;
  }

  function render() {
    const total    = MODES[mode].duration;
    const progress = timeLeft / total;
    arcEl.style.strokeDashoffset = CIRC * (1 - progress);
    timeEl.textContent = fmt(timeLeft);
    lblEl.textContent  = MODES[mode].label;
    document.title     = running
      ? `${fmt(timeLeft)} — ポモドーロ`
      : 'ポモドーロタイマー';

    const dots = dotsEl.querySelectorAll('.dot');
    const pos  = sessions % 4;
    dots.forEach((d, i) => d.classList.toggle('done', i < pos));
    sessText.textContent = `${sessions} セッション完了`;
  }

  // ── Mode switch ───────────────────────────────────────────────

  function switchMode(m, auto = false) {
    if (running) stopTimer();

    appEl.classList.replace(MODES[mode].cls, MODES[m].cls);
    glowEl.style.background = GLOW[m];
    mode     = m;
    timeLeft = MODES[m].duration;

    tabs.forEach(t => {
      const sel = t.dataset.mode === m;
      t.classList.toggle('active', sel);
      t.setAttribute('aria-selected', sel);
    });

    startBtn.textContent = '開始';
    appEl.classList.remove('running');
    render();
  }

  // ── Timer control ─────────────────────────────────────────────

  function startTimer() {
    running = true;
    ticker  = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        timeLeft = 0;
        render();
        complete();
      } else {
        render();
      }
    }, 1000);
    startBtn.textContent = '一時停止';
    appEl.classList.add('running');
  }

  function stopTimer() {
    running = false;
    clearInterval(ticker);
    ticker  = null;
    startBtn.textContent = '再開';
    appEl.classList.remove('running');
  }

  function toggle() { running ? stopTimer() : startTimer(); }

  function reset() {
    stopTimer();
    timeLeft = MODES[mode].duration;
    startBtn.textContent = '開始';
    render();
  }

  // ── Completion ────────────────────────────────────────────────

  function complete() {
    stopTimer();
    playBeep();
    flashScreen();

    if (mode === 'work') {
      sessions++;
      const next = sessions % 4 === 0 ? 'long' : 'short';
      setTimeout(() => switchMode(next, true), 650);
    } else {
      setTimeout(() => switchMode('work', true), 650);
    }
    render();
  }

  function flashScreen() {
    const el = document.createElement('div');
    el.className = 'c-flash';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }

  // ── Web Audio notification ────────────────────────────────────

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const master = ctx.createGain();
      master.gain.value = 0.22;
      master.connect(ctx.destination);

      [[659, 0, 0.22], [880, 0.16, 0.22], [1108, 0.32, 0.38]].forEach(([freq, delay, dur]) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(master);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(1, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t);
        osc.stop(t + dur + 0.02);
      });
    } catch (_) {}
  }

  // ── Events ───────────────────────────────────────────────────

  startBtn.addEventListener('click', toggle);
  resetBtn.addEventListener('click', reset);
  skipBtn.addEventListener('click',  complete);

  tabs.forEach(t => t.addEventListener('click', () => switchMode(t.dataset.mode)));

  document.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    if (tag === 'BUTTON' || tag === 'INPUT' || tag === 'TEXTAREA') return;
    switch (e.code) {
      case 'Space':  e.preventDefault(); toggle(); break;
      case 'KeyR':   reset();            break;
      case 'Digit1': switchMode('work'); break;
      case 'Digit2': switchMode('short'); break;
      case 'Digit3': switchMode('long'); break;
    }
  });

  // ── Init ─────────────────────────────────────────────────────

  glowEl.style.background = GLOW.work;
  render();
})();
</script>
